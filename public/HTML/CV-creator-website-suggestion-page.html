<!DOCTYPE html>
<html>
  <head>
    <title class="js-title-puls">سیــــڤــــیەکــــەم</title>
    <link rel="stylesheet" href="../CSS/CV-creator-website.css">
  </head>
  <body class="home">
    <div class="header-container">
      <div class="header-left-container">
        <a class href="/"><button class="logo-button"><img class="web-logo" src="../CSS/Images/web-logo.png"></button></a>
      </div>
      <div class="header-middle-container">
        <a class href="/"><p class="web-name">سیــڤــیەکـەم</p></a>
      </div>
      <div class="header-right-container">
        <button class="menu-button" id="m0b0e">
          <img class="menu-icon" src="../CSS/Images/menu-icon.png">
        </button>
      </div>
    </div>
    <div class="choose-button-container">
  <p dir="rtl" class="suggestion-title">
    لێرە دەتوانیت هەر کڵێشەیەك کە لە خەیاڵتە زیادیکەیت بە وێنە یان فایل (وۆرد یان پاوەرپۆینت). دواتر ستافی ماڵپەڕی سیڤیەکەم خۆیان کڵێشەکەت زیاد دەکەن بۆ ناو لیستی کڵێشەکان.
  </p>
  <div class="contact-container">
    <label for="contact" dir="rtl" class="contact-lable">
      دوای ناردنی پێشنیارەکەت، کارگێڕەکان لەڕێگەی هەژماری تێلیگرامەکەتەوە یاخود ژمارەی مۆبایلەکەتەوە ئاگادارت دەکەنەوە لە پەسندبوونی کڵێشەکەت.
    </label>
    <input
      type="text"
      id="contact"
      class="js-contact contact-textbox"
      placeholder="هەژماری تێلێگرام یاخود ژمارەی مۆبایل"
    >
  </div>
  <button class="js-button choose-button1">
    فایلێك هەڵبژێرە
  </button>
  <input 
    type="file" 
    class="js-upload" 
    id="upload"
    multiple
    hidden
  >
</div>
    <div class="file-list js-file-list">
      <div class="empty">
        <p dir="rtl" class="nothing-yet">هیچ شتێك زیاد نەکراوە.</p>
      </div>
    </div>
    <div class="right-side-option01">
      <a href="/"><button class="menu-option-button js-menu-option-button">ماڵەوە</button></a>
      <a href="/designs"><button class="menu-option-button js-menu-option-button">کڵێشەکان</button></a>
      <a href="/suggestion"><button class="menu-option-button js-menu-option-button">پێشنیارکردن</button></a>
      <a href="/staff"><button class="menu-option-button js-menu-option-button">ستاف</button></a>
    </div>
    <div class="popup-overlay js-popup-overlay">
      <div class="popup-window">
        <h2 class="popup-title">ببوورە</h2>
        <p class="popup-message js-popup-message">
          پەیام
        </p>
        <button class="popup-button js-popup-button">
          باشە
        </button>
      </div>
    </div>
    <script src="../JS/CV-creator-website-suggestion.js"></script>
  </body>
</html>
